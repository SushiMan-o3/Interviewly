services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_mock_interview
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # 'db' is the service name above — Compose resolves it on the shared network
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_mock_interview
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 300
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount source for live reload during dev
      - ./backend:/app
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://127.0.0.1:8000
      VITE_WS_URL: ws://127.0.0.1:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      # Keep container's node_modules; don't let the host dir shadow it
      - /app/node_modules

volumes:
  pgdata:
